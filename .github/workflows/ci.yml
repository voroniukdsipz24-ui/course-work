name: Python CI

on: [push]

jobs:
 test:

  runs-on: ubuntu-latest

  strategy:
   matrix:
    python-version: [3.9, 3.11]

  steps:

  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
     python-version: ${{ matrix.python-version }}

  - run: pip install -r requirements.txt

  - run: pytest -v
